<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'">
  <title>番茄钟</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <!-- 顶部 Tab -->
    <nav class="tabs">
      <button class="tab active" data-tab="timer">⏱ 计时</button>
      <button class="tab" data-tab="stats">📊 统计</button>
      <button class="tab" data-tab="settings">⚙ 设置</button>
    </nav>

    <!-- 计时页 -->
    <section class="page active" id="page-timer">
      <div class="phase-label" id="phaseLabel">工作时间</div>

      <div class="timer-ring">
        <svg viewBox="0 0 200 200">
          <circle cx="100" cy="100" r="90" class="ring-bg"/>
          <circle cx="100" cy="100" r="90" class="ring-fg" id="ringFg"
                  stroke-dasharray="565.48" stroke-dashoffset="0"/>
        </svg>
        <div class="time-display" id="timeDisplay">25:00</div>
      </div>

      <div class="task-input-wrap">
        <input type="text" id="taskInput" placeholder="正在做什么任务？（可选）" maxlength="60">
      </div>

      <div class="controls">
        <button class="btn primary" id="btnStart">开始</button>
        <button class="btn" id="btnPause" disabled>暂停</button>
        <button class="btn" id="btnReset">重置</button>
        <button class="btn" id="btnSkip">跳过</button>
      </div>

      <div class="round-info">
        当前轮次：<span id="roundNum">1</span> / 4
        今日完成：<span id="todayCount">0</span> 🍅
      </div>
    </section>

    <!-- 统计页 -->
    <section class="page" id="page-stats">
      <div class="stat-cards">
        <div class="stat-card">
          <div class="stat-num" id="statToday">0</div>
          <div class="stat-label">今日</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" id="statWeek">0</div>
          <div class="stat-label">本周</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" id="statTotal">0</div>
          <div class="stat-label">累计</div>
        </div>
      </div>

      <h3 class="section-title">历史记录</h3>
      <div class="history-list" id="historyList">
        <div class="empty">还没有记录，加油完成第一个番茄吧！</div>
      </div>

      <button class="btn danger small" id="btnClearHistory">清空所有记录</button>
    </section>

    <!-- 设置页 -->
    <section class="page" id="page-settings">
      <div class="form-group">
        <label>工作时长（分钟）</label>
        <input type="number" id="setWork" min="1" max="120" value="25">
      </div>
      <div class="form-group">
        <label>短休息时长（分钟）</label>
        <input type="number" id="setShort" min="1" max="60" value="5">
      </div>
      <div class="form-group">
        <label>长休息时长（分钟）</label>
        <input type="number" id="setLong" min="1" max="60" value="15">
      </div>
      <div class="form-group">
        <label>每多少轮一次长休息</label>
        <input type="number" id="setRounds" min="2" max="10" value="4">
      </div>
      <div class="form-group switch-row">
        <label>声音提醒</label>
        <input type="checkbox" id="setSound" checked>
      </div>
      <div class="form-group switch-row">
        <label>系统通知</label>
        <input type="checkbox" id="setNotify" checked>
      </div>
      <div class="form-group switch-row">
        <label>自动开始下一阶段</label>
        <input type="checkbox" id="setAuto">
      </div>

      <button class="btn primary" id="btnSaveSettings">保存设置</button>
      <div class="hint">修改后请重置计时器使其生效</div>
    </section>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
